name: Build Windows installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into app
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: echo "__version__ = \"${{ steps.ver.outputs.version }}\"" > version.py

      - name: Build executable
        run: pyinstaller --noconfirm Talkie-Putty.spec

      - name: Build installer
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DAppVersion=${{ steps.ver.outputs.version }}
          installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: Talkie-Putty-Setup
          path: installer-output/*.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" installer-output/*.exe --title "${{ github.ref_name }}" --generate-notes
